# Call Intelligence stack — ERPNext v15 only (pinned image tag; not v16).
# Site name: frontend — http://localhost:8080

networks:
  frappe_network:
    driver: bridge

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

services:
  configurator:
    image: frappe/erpnext:version-15
    platform: linux/amd64
    restart: on-failure
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        bench set-config -g chromium_path /usr/bin/chromium-headless-shell;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ../call_intelligence:/home/frappe/frappe-bench/apps/call_intelligence
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks:
      - frappe_network

  create-site:
    image: frappe/erpnext:version-15
    platform: linux/amd64
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - bash /scripts/bootstrap.sh
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ../call_intelligence:/home/frappe/frappe-bench/apps/call_intelligence
      - ./bootstrap.sh:/scripts/bootstrap.sh:ro
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks:
      - frappe_network

  backend:
    image: frappe/erpnext:version-15
    platform: linux/amd64
    restart: on-failure
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ../call_intelligence:/home/frappe/frappe-bench/apps/call_intelligence
    depends_on:
      configurator:
        condition: service_completed_successfully
      create-site:
        condition: service_completed_successfully
    networks:
      - frappe_network

  websocket:
    image: frappe/erpnext:version-15
    platform: linux/amd64
    restart: on-failure
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ../call_intelligence:/home/frappe/frappe-bench/apps/call_intelligence
    depends_on:
      configurator:
        condition: service_completed_successfully
      create-site:
        condition: service_completed_successfully
    networks:
      - frappe_network

  queue-short:
    image: frappe/erpnext:version-15
    platform: linux/amd64
    restart: on-failure
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ../call_intelligence:/home/frappe/frappe-bench/apps/call_intelligence
    depends_on:
      configurator:
        condition: service_completed_successfully
      create-site:
        condition: service_completed_successfully
    networks:
      - frappe_network

  queue-long:
    image: frappe/erpnext:version-15
    platform: linux/amd64
    restart: on-failure
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ../call_intelligence:/home/frappe/frappe-bench/apps/call_intelligence
    depends_on:
      configurator:
        condition: service_completed_successfully
      create-site:
        condition: service_completed_successfully
    networks:
      - frappe_network

  scheduler:
    image: frappe/erpnext:version-15
    platform: linux/amd64
    restart: on-failure
    command:
      - bench
      - schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ../call_intelligence:/home/frappe/frappe-bench/apps/call_intelligence
    depends_on:
      configurator:
        condition: service_completed_successfully
      create-site:
        condition: service_completed_successfully
    networks:
      - frappe_network

  frontend:
    image: frappe/erpnext:version-15
    platform: linux/amd64
    restart: on-failure
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: frontend
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - websocket
    networks:
      - frappe_network

  db:
    image: mariadb:10.6
    restart: on-failure
    healthcheck:
      test: mysqladmin ping -h localhost --password=admin
      interval: 1s
      retries: 30
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - frappe_network

  redis-cache:
    image: redis:6.2-alpine
    restart: on-failure
    networks:
      - frappe_network

  redis-queue:
    image: redis:6.2-alpine
    restart: on-failure
    volumes:
      - redis-queue-data:/data
    networks:
      - frappe_network
